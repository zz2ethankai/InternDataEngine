tasks:
  -
    name: banana_base_task  # task name
    asset_root: workflows/simbox/assets
    task: BananaBaseTask  # !! where you specify TASK class
    task_id: 0

    offset: null
    render: False


    # Arena configuration
    arena_file: workflows/simbox/core/configs/arenas/base_arena.yaml
    # arena_file: workflows/simbox/core/configs/arenas/scene_arena.yaml

    env_map:
      envmap_lib: envmap_lib
      apply_randomization: True
      intensity_range: [1500, 4000]
      rotation_range: [0, 180]

    neglect_collision_names: ["table"]

    robots:
      -
        name: "lift2"
        robot_config_file: workflows/simbox/core/configs/robots/lift2.yaml
        euler: [0.0, 0.0, 90.0]
        ignore_substring: ["table", "bolt", "box"]

    objects:
      -
        name: bolt_left1
        path: long_horizon/dex_manip/left/bolt/bolt_0/Aligned_obj.usd
        target_class: RigidObject
        dataset: oo3d
        category: bottle
        prim_path_child: Aligned
        translation: [0.0, 0.0, 0.0]
        euler: [90.0, 0.0, 0.0]  # stable init pose
        scale: [1, 1, 1]
        apply_randomization: True
        orientation_mode: suggested
      -
        name: bolt_right1
        path: long_horizon/dex_manip/right/bolt/bolt_0/Aligned_obj.usd
        target_class: RigidObject
        dataset: oo3d
        category: bottle
        prim_path_child: Aligned
        translation: [0.0, 0.0, 0.0]
        euler: [90.0, 0.0, 0.0]  # stable init pose
        scale: [1, 1, 1]
        apply_randomization: True
        orientation_mode: suggested
      -
        name: box
        path: long_horizon/dex_manip/box/box_0/Aligned_obj.usd
        target_class: RigidObject
        dataset: oo3d
        category: bottle
        prim_path_child: Aligned
        translation: [0.0, 0.0, 0.0]
        euler: [90.0, 0.0, 0.0]  # stable init pose
        scale: [1, 1, 1]

    regions:
      -
        object: bolt_left1
        target: table
        random_type: A_on_B_region_sampler
        random_config:
          pos_range: [
            [-0.3, -0.35, 0.0],
            [-0.25, -0.25, 0.0]
          ]
          yaw_rotation: [-10.0, 10.0]
      -
        object: bolt_right1
        target: table
        random_type: A_on_B_region_sampler
        random_config:
          pos_range: [
            [0.1, -0.35, 0.0],
            [0.15, -0.25, 0.0]
          ]
          yaw_rotation: [-10.0, 10.0]
      -
        object: box
        target: table
        random_type: A_on_B_region_sampler
        random_config:
          pos_range: [
            [0.0, -0.1, 0.0],
            [0.0, -0.1, 0.0]
          ]
          yaw_rotation: [0.0, 0.0]
      -
        object: lift2
        target: table
        random_type: A_on_B_region_sampler
        random_config:
          pos_range: [
            [0.0, -0.90, -0.8],
            [0.0, -0.90, -0.77]
          ]
          yaw_rotation: [0.0, 0.0]

    cameras:
      -
        name: lift2_hand_left
        translation: [0.07, 0.01, 0.08]
        orientation: [0.62, 0.33, -0.33, -0.62]
        camera_axes: usd
        camera_file: workflows/simbox/core/configs/cameras/realsense_d405.yaml
        parent: "lift2/lift2/lift2/fl/link6"  # todo
        apply_randomization: True
        max_translation_noise: 0.02
        max_orientation_noise: 2.5
      -
        name: lift2_hand_right
        translation: [0.07, 0.01, 0.08]
        orientation: [0.62, 0.33, -0.33, -0.62]
        camera_axes: usd
        camera_file: workflows/simbox/core/configs/cameras/realsense_d405.yaml
        parent: "lift2/lift2/lift2/fr/link6"
        apply_randomization: True
        max_translation_noise: 0.02
        max_orientation_noise: 2.5
      -
        name: lift2_head
        translation: [0.1, 0.02, 0.03]
        orientation: [0.6602, 0.2534, -0.2534, -0.6602]
        camera_axes: usd
        camera_file: workflows/simbox/core/configs/cameras/realsense_d455_v3.yaml
        parent: "lift2/lift2/lift2/h_link6"  # todo: robot base frame
        apply_randomization: True
        max_translation_noise: 0.03
        max_orientation_noise: 5.0

    data:
      task_dir: "sort parts"
      language_instruction: "Pick the cutter one by one and place into the box."
      detailed_language_instruction: "Grasp and lift the cutter, and place into the box."
      collect_info: "l1r1"
      version: "v3.0, head camerea 1280x720, wrist 640x480, y 45 degrees"
      update: True
      max_episode_length: 4000

    skills:
      -
        lift2:
          -
            left:
              -
                name: dexpick
                objects: [bolt_left1]
                pick_pose_idx: 0  # use the 0-th pick pose group
                pre_grasp_offset: 0.0
                post_grasp_offset: 0.1
              -
                name: dexplace
                objects: [bolt_left1, box]
                camera_axis_filter:
                  - direction: [0, 0, 1]
                  - degree: [0, 45]
              -
                name: heuristic__skill
                mode: home
                gripper_state: 1.0 # Open gripper
            right:
              -
                name: dexpick
                objects: [bolt_right1]
                pick_pose_idx: 0  # use the 0-th pick pose group
                pre_grasp_offset: 0.0
                post_grasp_offset: 0.1
              -
                name: dexplace
                objects: [bolt_right1, box]
                camera_axis_filter:
                  - direction: [0, 0, 1]
                  - degree: [0, 45]
              -
                name: heuristic__skill
                mode: home
                gripper_state: 1.0 # Open gripper
